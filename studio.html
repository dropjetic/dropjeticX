<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropjetic Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  <header class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[94%] max-w-7xl">
<div class="backdrop-blur-xl bg-black/40 border border-white/10 rounded-2xl p-3 flex items-center justify-between gap-4">
  <!-- existing content -->
  <div class="flex items-center gap-3 flex-wrap justify-end">
    <button onclick="logout()" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-xl transition text-sm">Logout</button>
    <!-- existing buttons -->
    <button onclick="saveMap()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl transition text-sm">Save</button>
    <button onclick="loadMap()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl transition text-sm">Load</button>
    <button onclick="toggleFullScreen()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl transition text-sm">Fullscreen</button>
  </div>
</div>
</header>
html,body{margin:0;width:100%;height:100%;background:#000;color:#fff;font-family:ui-monospace,monospace;overflow:hidden}
.red-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(180,0,0,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(180,0,0,.15) 1px,transparent 1px);background-size:50px 50px;animation:gridMove 35s linear infinite;z-index:-3;pointer-events:none}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:100px 100px}}
.crt{filter:contrast(1.1)brightness(1.03)}
canvas{image-rendering:pixelated;border:4px solid #27272a;box-shadow:0 0 40px rgba(59,130,246,.25);background:#111}
.sidebar-content{overflow-y:auto;max-height:calc(100vh - 170px)}
.panel-scroll{scrollbar-width:thin;scrollbar-color:#3f3f46 #09090b}
.btn-on{background:linear-gradient(90deg,#2563eb,#7c3aed)!important}
.small-scroll::-webkit-scrollbar,.sidebar-content::-webkit-scrollbar{width:10px}
.small-scroll::-webkit-scrollbar-track,.sidebar-content::-webkit-scrollbar-track{background:#09090b}
.small-scroll::-webkit-scrollbar-thumb,.sidebar-content::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:999px}
</style>
</head>
<body class="min-h-screen flex flex-col">
<div class="red-grid"></div>
<header class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[94%] max-w-7xl">
<div class="backdrop-blur-xl bg-black/40 border border-white/10 rounded-2xl p-3 flex items-center justify-between gap-4">
<a class="flex items-center gap-3 pl-2" href="/">
<div class="relative w-8 h-8"><div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full opacity-70 blur-sm"></div><div class="absolute inset-0 flex items-center justify-center"><img alt="logo" src="https://iili.io/Fldrem7.png" class="w-full h-full object-cover rounded-full"></div></div>
<span class="font-bold text-xl tracking-tight">Dropjetic Studio</span>
</a>
<div class="flex items-center gap-3 text-sm">
<span class="px-4 py-1.5 bg-emerald-500/10 text-emerald-400 rounded-xl border border-emerald-500/30">STUDIO v2.0</span>
<span id="level-indicator" class="px-4 py-1.5 bg-blue-500/10 text-blue-300 rounded-xl border border-blue-500/20">Level 1</span>
</div>
<div class="flex items-center gap-3 flex-wrap justify-end">
<button onclick="saveMap()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl transition text-sm">Save</button>
<button onclick="loadMap()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl transition text-sm">Load</button>
<button onclick="toggleFullScreen()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl transition text-sm">Fullscreen</button>
</div>
</div>
</header>
<div id="app" class="flex-1 flex pt-28 pb-10 px-6 gap-8 max-w-[1700px] mx-auto w-full">
<div class="flex-1 flex flex-col items-center min-w-[520px]">
<div class="text-center mb-4">
<h1 class="text-4xl font-bold tracking-tight mb-2">2D <span class="bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">Studio</span></h1>
<p class="text-zinc-400">Create • Edit • Play • Drag • Script</p>
</div>
<div class="relative mx-auto crt max-w-full" id="canvas-wrap">
<div class="bg-zinc-950 border-4 border-zinc-800 rounded-3xl p-5 shadow-2xl">
<canvas id="game" width="480" height="480" class="rounded-2xl block"></canvas>
</div>
</div>
<div class="mt-6 flex flex-wrap justify-center gap-3">
<button onclick="setMode('edit')" id="btn-edit" class="mode-btn px-6 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 hover:brightness-110 transition font-medium">✏ Edit Mode</button>
<button onclick="setMode('play')" id="btn-play" class="mode-btn px-6 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 transition font-medium">▶ Play Mode</button>
<button onclick="setTool('paint')" id="tool-paint" class="tool-btn px-5 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 transition font-medium">Paint</button>
<button onclick="setTool('erase')" id="tool-erase" class="tool-btn px-5 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 transition font-medium">Erase</button>
<button onclick="setTool('object')" id="tool-object" class="tool-btn px-5 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 transition font-medium">Object</button>
<button onclick="setTool('drag')" id="tool-drag" class="tool-btn px-5 py-3 rounded-2xl bg-zinc-800 hover:bg-zinc-700 transition font-medium">Drag</button>
</div>
<div class="text-center mt-4 text-xs text-zinc-500">Click to draw • Drag objects • WASD move • SPACE jump • Arrow keys also work</div>
</div>
<div id="sidebar" class="w-[450px] bg-zinc-900/80 border border-white/10 rounded-3xl p-6 flex flex-col h-fit shrink-0">
<div class="sidebar-content small-scroll pr-1">
<h3 class="font-bold text-lg mb-3">Blocks JSON</h3>
<textarea id="json-editor" class="w-full h-64 bg-black border border-white/20 focus:border-blue-500 rounded-2xl p-4 text-white font-mono text-xs resize-none small-scroll" spellcheck="false"></textarea>
<div class="flex gap-2 mt-3">
<button onclick="loadJSONFile()" class="flex-1 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 hover:brightness-110 transition font-medium">Load JSON</button>
<button onclick="downloadBlocksJSON()" class="flex-1 py-3 rounded-2xl bg-white/10 hover:bg-white/20 transition font-medium">Download JSON</button>
</div>
<button onclick="copyJSON()" class="mt-2 w-full py-3 rounded-2xl bg-white/10 hover:bg-white/20 transition font-medium">Copy JSON</button>
<button onclick="runLevelScript()" class="mt-2 w-full py-3 rounded-2xl bg-white/10 hover:bg-white/20 transition font-medium">Run Level Script</button>
<h3 class="font-bold text-lg mb-4 mt-8">Blocks</h3>
<div id="blocks-container" class="grid grid-cols-3 gap-3"></div>
<h3 class="font-bold text-lg mb-4 mt-8">Layer</h3>
<div class="grid grid-cols-3 gap-2">
<button onclick="setLayer('background')" id="layer-background" class="py-2 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 text-sm">Background</button>
<button onclick="setLayer('collision')" id="layer-collision" class="py-2 rounded-xl bg-zinc-800 text-sm">Collision</button>
<button onclick="setLayer('decor')" id="layer-decor" class="py-2 rounded-xl bg-zinc-800 text-sm">Decor</button>
</div>
<h3 class="font-bold text-lg mb-4 mt-8">Character</h3>
<div class="space-y-4">
<div>Image URL<br><input id="char-url" type="text" class="w-full bg-black border border-white/20 focus:border-blue-500 rounded-2xl px-4 py-3 text-white text-sm" placeholder="https://example.com/char.png"></div>
<div>Height <span id="height-val" class="text-blue-400">0.85</span><br><input id="char-height" type="range" min="0.3" max="1.2" step="0.05" value="0.85" class="w-full accent-blue-500" onchange="updateCharHeight()"></div>
</div>
<h3 class="font-bold text-lg mb-4 mt-8">Levels</h3>
<button onclick="generateAIMap()" class="w-full py-3 mb-3 rounded-2xl bg-gradient-to-r from-purple-600 to-pink-600 hover:brightness-110 transition font-medium">Generate Map with AI (100 levels)</button>
<div class="flex gap-2 mb-3">
<button onclick="addLevel()" class="flex-1 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-purple-600 hover:brightness-110 transition font-medium">Add Level</button>
<button onclick="duplicateLevel()" class="flex-1 py-3 rounded-2xl bg-white/10 hover:bg-white/20 transition font-medium">Duplicate</button>
</div>
<div class="flex gap-2 mb-3">
<button onclick="prevLevel()" class="flex-1 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm">Prev</button>
<button onclick="nextLevel()" class="flex-1 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm">Next</button>
<button onclick="deleteLevel()" class="flex-1 py-2 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm">Delete</button>
</div>
<div id="levels-container" class="space-y-2"></div>
<h3 class="font-bold text-lg mb-4 mt-8">Level Script</h3>
<textarea id="script-editor" class="w-full h-44 bg-black border border-white/20 focus:border-blue-500 rounded-2xl p-4 text-white font-mono text-xs resize-none small-scroll" spellcheck="false" placeholder="spawn object 5 12 crate\nset collision 3 15 wall\nmessage hello"></textarea>
</div>
</div>
</div>
<footer class="py-10 border-t border-white/10 bg-black/80 mt-auto">
<div class="max-w-5xl mx-auto px-6 text-center">
<div class="flex flex-col items-center gap-5">
<div class="flex items-center gap-3"><img alt="logo" src="https://iili.io/Fldrem7.png" class="w-8 h-8 rounded-full"><span class="font-bold text-2xl tracking-tight">Dropjetic</span></div>
<div class="flex flex-wrap justify-center gap-4">
<button onclick="exportAsJSON()" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:brightness-110 rounded-2xl font-medium transition">Export Full Map</button>
<button onclick="saveMap()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-2xl font-medium transition">Save to Browser</button>
<button onclick="loadMap()" class="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-2xl font-medium transition">Load from Browser</button>
</div>
<p class="text-zinc-500 text-sm mt-2">© 2026 Dropjetic • Studio</p>
</div>
</div>
</footer>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const app=document.getElementById('app');
const sidebar=document.getElementById('sidebar');
const canvasWrap=document.getElementById('canvas-wrap');
const TILE=24;
let fullscreen=false;
let mode='edit';
let tool='paint';
let layer='collision';
let currentTile='wall';
let currentLevelIndex=0;
let selectedObjectId=null;
let isDragging=false;
let dragOffsetX=0;
let dragOffsetY=0;
let mouseWorld={x:0,y:0};
let keys={};
let player={x:3,y:5,w:0.85,h:0.95,vx:0,vy:0,onGround:false};
let charUrl='';
let charHeight=0.85;
let charImage=null;
let camera={x:0,y:0};
let messageText='';
let messageTimer=0;
let world={levels:[]};
const TILE_DEFS=[
{id:'air',name:'Air',layer:'collision',color:'#111111',solid:false},
{id:'wall',name:'Wall',layer:'collision',color:'#27272a',solid:true},
{id:'brick',name:'Brick',layer:'collision',color:'#4b5563',solid:true},
{id:'grass',name:'Grass',layer:'collision',color:'#166534',solid:true},
{id:'slope_up',name:'Slope ↗',layer:'collision',color:'#7c3aed',solid:true,slope:'up'},
{id:'slope_down',name:'Slope ↘',layer:'collision',color:'#2563eb',solid:true,slope:'down'},
{id:'sky',name:'Sky',layer:'background',color:'#0f172a',solid:false},
{id:'stars',name:'Stars',layer:'background',color:'#1e293b',solid:false},
{id:'crate',name:'Crate',layer:'decor',color:'#b45309',solid:false,object:true,draggable:true},
{id:'lamp',name:'Lamp',layer:'decor',color:'#eab308',solid:false,object:true,draggable:true}
];
function layerOrder(){return ['background','collision','decor'];}
function blankGrid(w,h,fill='air'){return Array.from({length:h},()=>Array.from({length:w},()=>fill));}
function createLevel(name='Level',w=24,h=20){return {name,width:w,height:h,background:blankGrid(w,h,'sky'),collision:blankGrid(w,h,'air'),decor:blankGrid(w,h,'air'),objects:[],script:'spawn object 8 14 crate',spawn:{x:3,y:5},scriptRan:false};}
function ensureWorld(){if(!world.levels.length){world.levels=[createLevel('Level 1',24,20),createLevel('Level 2',24,20)];fillDemo(world.levels[0]);fillDemo(world.levels[1],true);} }
function fillDemo(level,alt=false){for(let x=0;x<level.width;x++){level.collision[level.height-2][x]='grass';level.collision[level.height-1][x]='wall';if(alt&&x%5===0)level.decor[level.height-4][x]='lamp';if(x%7===0)level.background[level.height-8][x]='stars';}for(let x=4;x<10;x++)level.collision[level.height-5][x]='brick';level.decor[level.height-3][3]='crate';}
function currentLevel(){return world.levels[currentLevelIndex];}
function cloneLevel(level){return JSON.parse(JSON.stringify(level));}
function resizeCanvas(){if(fullscreen){canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.width='100vw';canvas.style.height='100vh';canvas.style.position='fixed';canvas.style.left='0';canvas.style.top='0';canvas.style.zIndex='5';canvas.style.border='0';canvas.style.boxShadow='none';app.style.paddingTop='0';app.style.paddingBottom='0';app.style.maxWidth='none';app.style.gap='0';sidebar.style.display='none';canvasWrap.style.width='100vw';camera.x=Math.max(0,camera.x);}else{canvas.width=480;canvas.height=480;canvas.style.width='480px';canvas.style.height='480px';canvas.style.position='static';canvas.style.zIndex='1';canvas.style.border='4px solid #27272a';canvas.style.boxShadow='0 0 40px rgba(59,130,246,.25)';app.style.paddingTop='112px';app.style.paddingBottom='40px';app.style.maxWidth='1700px';app.style.gap='32px';sidebar.style.display='flex';canvasWrap.style.width='auto';}renderUI();}
function setFullscreenMode(v){fullscreen=v;resizeCanvas();}
function toggleFullScreen(){setFullscreenMode(!fullscreen);}
function setMode(m){mode=m;updateModeButtons();}
function setTool(t){tool=t;selectedObjectId=null;updateToolButtons();}
function setLayer(l){layer=l;updateLayerButtons();}
function updateModeButtons(){const e=document.getElementById('btn-edit');const p=document.getElementById('btn-play');if(mode==='edit'){e.classList.add('btn-on');p.classList.remove('btn-on');e.classList.remove('bg-zinc-800');p.classList.add('bg-zinc-800');}else{p.classList.add('btn-on');e.classList.remove('btn-on');p.classList.remove('bg-zinc-800');e.classList.add('bg-zinc-800');}}
function updateToolButtons(){['paint','erase','object','drag'].forEach(t=>{const el=document.getElementById('tool-'+t);if(el){el.classList.toggle('btn-on',tool===t);el.classList.toggle('bg-zinc-800',tool!==t);}});}
function updateLayerButtons(){['background','collision','decor'].forEach(l=>{const el=document.getElementById('layer-'+l);if(el){el.classList.toggle('btn-on',layer===l);el.classList.toggle('bg-zinc-800',layer!==l);}});}
function tileDef(id){return TILE_DEFS.find(t=>t.id===id)||TILE_DEFS[0];}
function tileColor(id){return tileDef(id).color;}
function visibleCols(){return Math.ceil(canvas.width/TILE)+2;}
function visibleRows(){return Math.ceil(canvas.height/TILE)+2;}
function gridToCanvasX(x){return Math.floor((x-camera.x)*TILE);}
function gridToCanvasY(y){return Math.floor((y-camera.y)*TILE);}
function canvasToWorld(e){const rect=canvas.getBoundingClientRect();const x=(e.clientX-rect.left)*(canvas.width/rect.width);const y=(e.clientY-rect.top)*(canvas.height/rect.height);return {x:x/TILE+camera.x,y:y/TILE+camera.y};}
function makeObject(type,x,y){return {id:cryptoRandomId(),type,x,y,vx:0,vy:0,w:0.9,h:0.9,draggable:true,solid:true};}
function cryptoRandomId(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);}
function renderBlocks(){const c=document.getElementById('blocks-container');c.innerHTML='';TILE_DEFS.filter(t=>!t.object).forEach(t=>{const d=document.createElement('div');d.className=`flex flex-col items-center cursor-pointer rounded-2xl p-2 transition-all hover:bg-white/10 ${currentTile===t.id?'bg-blue-500/20 border-2 border-blue-500':'border border-transparent'}`;d.innerHTML=`<div class="w-14 h-14 rounded-xl mb-1 shadow-inner border border-white/10" style="background:${t.color}"></div><span class="text-[10px] text-center leading-tight">${t.name}</span>`;d.onclick=()=>{currentTile=t.id;renderBlocks();};c.appendChild(d);});}
function renderLevels(){const c=document.getElementById('levels-container');c.innerHTML='';world.levels.forEach((lvl,i)=>{const d=document.createElement('button');d.className=`w-full text-left px-4 py-3 rounded-2xl border transition ${i===currentLevelIndex?'bg-blue-500/20 border-blue-500':'bg-white/5 border-white/10 hover:bg-white/10'}`;d.innerHTML=`<div class="font-medium">${lvl.name}</div><div class="text-xs text-zinc-400">${lvl.width}×${lvl.height} • ${lvl.objects.length} objects</div>`;d.onclick=()=>loadLevel(i);c.appendChild(d);});document.getElementById('level-indicator').textContent=currentLevel()?currentLevel().name:`Level ${currentLevelIndex+1}`;}
function updateJSON(){const data=serializeWorld();document.getElementById('json-editor').value=JSON.stringify(data,null,2);document.getElementById('script-editor').value=currentLevel().script||'';}
function serializeWorld(){return {tiles:TILE_DEFS,levels:world.levels,charUrl,charHeight,currentLevelIndex};}
function hydrateWorld(data){if(!data||!Array.isArray(data.levels))return false;world.levels=data.levels;currentLevelIndex=Math.max(0,Math.min(data.currentLevelIndex||0,world.levels.length-1));charUrl=data.charUrl||'';charHeight=data.charHeight||0.85;document.getElementById('char-url').value=charUrl;document.getElementById('char-height').value=charHeight;document.getElementById('height-val').textContent=charHeight.toFixed(2);if(charUrl)loadCharacterImage(charUrl);loadLevel(currentLevelIndex,false);return true;}
function loadJSONFile(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];if(file){const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(hydrateWorld(data)){renderUI();}}catch(e){alert('Invalid JSON');}};reader.readAsText(file);}};input.click();}
function copyJSON(){navigator.clipboard.writeText(document.getElementById('json-editor').value);}
function downloadBlocksJSON(){const dataStr=JSON.stringify(serializeWorld(),null,2);const dataUri='data:application/json;charset=utf-8,'+encodeURIComponent(dataStr);const link=document.createElement('a');link.href=dataUri;link.download='dropjetic_map.json';link.click();}
function exportAsJSON(){downloadBlocksJSON();}
function saveMap(){localStorage.setItem('dropjetic_map',JSON.stringify(serializeWorld()));alert('Map saved!');}
function loadMap(){const d=localStorage.getItem('dropjetic_map');if(d){hydrateWorld(JSON.parse(d));renderUI();alert('Map loaded!');}else alert('No saved map.');}
function loadCharacterImage(url){const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{charImage=img;};img.onerror=()=>{charImage=null;};img.src=url;}
function updateCharHeight(){charHeight=parseFloat(document.getElementById('char-height').value);document.getElementById('height-val').textContent=parseFloat(charHeight).toFixed(2);}
function currentTileForLayer(lvl,x,y,l){if(x<0||y<0||x>=lvl.width||y>=lvl.height)return 'air';return lvl[l][y][x];}
function setTile(lvl,x,y,l,id){if(x<0||y<0||x>=lvl.width||y>=lvl.height)return;lvl[l][y][x]=id;}
function loadLevel(index,resetPlayer=true,keepCamera=false){currentLevelIndex=Math.max(0,Math.min(index,world.levels.length-1));const lvl=currentLevel();lvl.scriptRan=false;runLevelScript(true);if(resetPlayer){player.x=(lvl.spawn?.x||3);player.y=(lvl.spawn?.y||5
